name: Edge AI Build & Automated Verification CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install System Dependencies & GStreamer
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libopencv-dev ffmpeg libgl1

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision numpy opencv-python-headless fastapi uvicorn requests

    - name: Run Master Model Benchmark Suite
      run: |
        python scripts/master_model_comparator.py --num-samples 50

    - name: Run Statistical Evaluation Suite
      run: |
        python scripts/evaluate_bcs_pipeline.py --num-samples 100

    - name: Run TFLite Advanced Converter Test
      run: |
        python scripts/compile_tflite_advanced.py --output-dir models/tflite

    - name: Test Go RTSP Dispatcher Build
      uses: actions/setup-go@v4
      with:
        go-version: '1.20'
    - run: |
        cd go_rtsp_dispatcher
        go run main.go
